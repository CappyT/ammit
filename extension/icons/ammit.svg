<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Ammit: flat crocodile head, open jaws, Egyptian gold on dark. -->
  <rect width="128" height="128" rx="24" fill="#131313"/>
  <g fill="#d4a017">
    <!-- upper skull + long flat snout -->
    <path d="M14 48
             Q14 31 32 29
             L46 28
             Q56 27 61 33
             L114 40
             Q120 42 118 47
             L64 51
             L25 53
             Q15 53 14 48 Z"/>
    <!-- upper teeth (hang below the mouth line) -->
    <path d="M38 53 l4.5 10 4.5-10 Z"/>
    <path d="M56 52 l4.5 10 4.5-10 Z"/>
    <path d="M74 50.5 l4.5 10 4.5-10 Z"/>
    <path d="M92 49 l4.5 10 4.5-10 Z"/>
    <path d="M106 48 l4 9 4-9 Z"/>
    <!-- lower jaw: slim beam, opened wide -->
    <path d="M28 64
             Q26 60 32 61
             L104 79
             Q110 81 106 87
             L46 99
             Q38 100 36 93
             Z"/>
    <!-- lower teeth (rise above the jaw's top edge) -->
    <path d="M46 66.5 l4 -11 5 8.5 Z"/>
    <path d="M64 71 l4 -11 5 8.5 Z"/>
    <path d="M82 75.5 l4 -11 5 8.5 Z"/>
    <path d="M97 79 l3.5 -10 4.5 8 Z"/>
  </g>
  <!-- eye -->
  <circle cx="34" cy="40" r="5" fill="#131313"/>
  <circle cx="34" cy="40" r="2.2" fill="#d4a017"/>
</svg>
