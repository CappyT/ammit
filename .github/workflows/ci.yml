name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: write # release assets
  packages: write # ghcr push

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - name: syntax check
        run: |
          for f in extension/src/*.js tools/*.mjs; do node --check "$f"; done
          node -e "JSON.parse(require('fs').readFileSync('extension/manifest.json'))"
          for f in extension/_locales/*/messages.json; do node -e "JSON.parse(require('fs').readFileSync('$f'))"; done
      - name: web-ext lint (firefox)
        run: npx --yes web-ext lint --source-dir extension

  extension:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - name: package extension
        run: |
          cd extension
          zip -r ../ammit-${GITHUB_REF_NAME//\//-}.zip . -x 'icons/ammit.svg'
      - uses: actions/upload-artifact@v4
        with:
          name: ammit-extension
          path: ammit-*.zip
      - name: release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" ammit-*.zip --generate-notes --title "Ammit $GITHUB_REF_NAME"

  # AMO-signed xpi (unlisted channel = self-distribution) attached to the
  # release. Requires AMO_JWT_ISSUER / AMO_JWT_SECRET repo secrets from
  # https://addons.mozilla.org/developers/addon/api/key/ — skipped when unset.
  sign-firefox:
    runs-on: ubuntu-latest
    needs: extension
    if: startsWith(github.ref, 'refs/tags/')
    env:
      WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
      WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - name: sign xpi via amo
        run: |
          if [ -z "$WEB_EXT_API_KEY" ] || [ -z "$WEB_EXT_API_SECRET" ]; then
            echo "::warning::AMO_JWT_ISSUER / AMO_JWT_SECRET not set — skipping signing"
            exit 0
          fi
          npx --yes web-ext sign --source-dir extension --channel unlisted \
            --ignore-files icons/ammit.svg --artifacts-dir web-ext-artifacts
      - name: attach signed xpi to release
        if: hashFiles('web-ext-artifacts/*.xpi') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" web-ext-artifacts/*.xpi
