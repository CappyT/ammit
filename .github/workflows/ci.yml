name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: write # release assets
  packages: write # ghcr push

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - name: syntax check
        run: |
          for f in extension/src/*.js server/*.mjs tools/*.mjs; do node --check "$f"; done
          node -e "JSON.parse(require('fs').readFileSync('extension/manifest.json'))"
      - name: server e2e tests
        run: node server/test.mjs

  container:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/cappyt/ammit
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  extension:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - name: package extension
        run: |
          cd extension
          zip -r ../ammit-${GITHUB_REF_NAME//\//-}.zip . -x 'icons/ammit.svg'
      - uses: actions/upload-artifact@v4
        with:
          name: ammit-extension
          path: ammit-*.zip
      - name: release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" ammit-*.zip --generate-notes --title "Ammit $GITHUB_REF_NAME"
