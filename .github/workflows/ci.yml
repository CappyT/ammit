name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: write # release assets
  packages: write # ghcr push

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - name: syntax check
        run: |
          for f in extension/src/*.js tools/*.mjs; do node --check "$f"; done
          node -e "JSON.parse(require('fs').readFileSync('extension/manifest.json'))"
          for f in extension/_locales/*/messages.json; do node -e "JSON.parse(require('fs').readFileSync('$f'))"; done
      - name: web-ext lint (firefox manifest)
        run: |
          node tools/build-manifest.mjs firefox
          npx --yes web-ext lint --source-dir extension
          git checkout extension/manifest.json

  extension:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - name: package extension (per-browser manifests)
        run: |
          node tools/build-manifest.mjs chrome
          (cd extension && zip -r ../ammit-chrome-${GITHUB_REF_NAME//\//-}.zip . -x 'icons/ammit.svg')
          git checkout extension/manifest.json
          node tools/build-manifest.mjs firefox
          (cd extension && zip -r ../ammit-firefox-${GITHUB_REF_NAME//\//-}.xpi . -x 'icons/ammit.svg')
          git checkout extension/manifest.json
      - uses: actions/upload-artifact@v4
        with:
          name: ammit-extension
          path: |
            ammit-*.zip
            ammit-*.xpi
      - name: release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" ammit-*.zip ammit-*.xpi --generate-notes --title "Ammit $GITHUB_REF_NAME"

  # Submit the tagged version to AMO (listed channel) for review — the
  # extension is distributed from addons.mozilla.org, no artifact comes back.
  # Requires AMO_JWT_ISSUER / AMO_JWT_SECRET repo secrets from
  # https://addons.mozilla.org/developers/addon/api/key/ — skipped when unset.
  # A version already uploaded by hand on the dev hub is treated as success.
  submit-amo:
    runs-on: ubuntu-latest
    needs: checks
    if: startsWith(github.ref, 'refs/tags/')
    env:
      WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
      WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - name: submit to amo (listed channel)
        run: |
          if [ -z "$WEB_EXT_API_KEY" ] || [ -z "$WEB_EXT_API_SECRET" ]; then
            echo "::warning::AMO_JWT_ISSUER / AMO_JWT_SECRET not set — skipping amo submission"
            exit 0
          fi
          node tools/build-manifest.mjs firefox
          npx --yes web-ext sign --source-dir extension --channel listed \
            --approval-timeout 0 --ignore-files icons/ammit.svg 2>&1 | tee sign.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ] && grep -qi "already exists" sign.log; then
            echo "version already on amo — ok"
            exit 0
          fi
          exit "$status"

  # Upload + publish the tagged version to the Chrome Web Store. Requires
  # CWS_EXTENSION_ID, CWS_CLIENT_ID, CWS_CLIENT_SECRET, CWS_REFRESH_TOKEN
  # repo secrets (google cloud oauth client with the chrome web store api
  # enabled) — skipped when unset. The new version goes through cws review
  # and publishes automatically once approved.
  submit-cws:
    runs-on: ubuntu-latest
    needs: checks
    if: startsWith(github.ref, 'refs/tags/')
    env:
      EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
      CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
      REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - name: upload and publish to chrome web store
        run: |
          if [ -z "$EXTENSION_ID" ] || [ -z "$CLIENT_ID" ] || [ -z "$CLIENT_SECRET" ] || [ -z "$REFRESH_TOKEN" ]; then
            echo "::warning::CWS_* secrets not set — skipping chrome web store submission"
            exit 0
          fi
          node tools/build-manifest.mjs chrome
          (cd extension && zip -r ../ammit-chrome.zip . -x 'icons/ammit.svg')
          npx --yes chrome-webstore-upload-cli@3 upload --source ammit-chrome.zip --auto-publish
