apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ammit-report-api
  labels:
    app: ammit-report-api
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical          # CHANGE ME: your SecretStore/ClusterSecretStore name
  target:
    name: ammit-report-api   # k8s Secret this ExternalSecret materializes
    creationPolicy: Owner
  data:
    - secretKey: ADMIN_TOKEN
      remoteRef:
        key: ADMIN_TOKEN     # CHANGE ME: key/path in Infisical
    - secretKey: HMAC_SALT
      remoteRef:
        key: HMAC_SALT       # CHANGE ME
    # GIT_TOKEN is only needed if git publishing is enabled in the ConfigMap.
    # The Deployment references this key, so it must exist in the store
    # (use any non-empty value if unused). Remove both here and in the
    # Deployment env if you drop publishing entirely.
    - secretKey: GIT_TOKEN
      remoteRef:
        key: GIT_TOKEN       # CHANGE ME
