# Cloudflare Tunnel — the ONLY ingress path for this service.
# There are no Ingress/LoadBalancer objects: cloudflared dials OUT to
# Cloudflare and forwards to the ClusterIP Service. In the Zero Trust
# dashboard (remotely-managed tunnel) set the public hostname route to:
#   http://ammit-report-api.ammit.svc.cluster.local:8080
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflared-tunnel
  labels:
    app: cloudflared
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical          # CHANGE ME
  target:
    name: cloudflared-tunnel
    creationPolicy: Owner
  data:
    - secretKey: TUNNEL_TOKEN
      remoteRef:
        key: CLOUDFLARED_TUNNEL_TOKEN   # CHANGE ME
# --- Plain Secret alternative: delete the ExternalSecret above and use ---
# apiVersion: v1
# kind: Secret
# metadata:
#   name: cloudflared-tunnel
# type: Opaque
# stringData:
#   TUNNEL_TOKEN: "REPLACE_WITH_TUNNEL_TOKEN"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  labels:
    app: cloudflared
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          # --metrics enables the /ready + /metrics endpoints used by the probe.
          args:
            - tunnel
            - --no-autoupdate
            - --metrics
            - 0.0.0.0:2000
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-tunnel
                  key: TUNNEL_TOKEN
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
