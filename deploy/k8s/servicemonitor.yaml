apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ammit-report-api
  labels:
    app: ammit-report-api
  # No `release:` label — this Prometheus selects ALL ServiceMonitors.
spec:
  selector:
    matchLabels:
      app: ammit-report-api
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
